# FreeFSM Nginx reverse proxy configuration
# Copy to /etc/nginx/sites-available/freefsm and symlink to
# /etc/nginx/sites-enabled/, or inline into your main nginx.conf.
#
# Replace:
#   - example.com         with your domain
#   - /etc/letsencrypt    with your cert path (or remove the SSL block for HTTP-only)
#   - 127.0.0.1:3000      with your FreeFSM listen address (matches FREEFSM_ADDR)

upstream freefsm {
    server 127.0.0.1:3000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # ------------------------------------------------------------------
    # SSL hardening
    # ------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "0" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # Gzip
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ------------------------------------------------------------------
    # Rate limiting
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=freefsm_api:10m rate=30r/s;

    # ------------------------------------------------------------------
    # Static files (cache aggressively)
    # ------------------------------------------------------------------
    location /static/ {
        proxy_pass http://freefsm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Application
    # ------------------------------------------------------------------
    location / {
        limit_req zone=freefsm_api burst=20 nodelay;

        proxy_pass http://freefsm;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large enough for HTMX responses and line-item payloads
        proxy_buffer_size       4k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        # Timeouts
        proxy_connect_timeout   10s;
        proxy_read_timeout      60s;
        proxy_send_timeout      60s;

        # Match FREEFSM_MAX_UPLOAD_SIZE default (25 MiB)
        client_max_body_size    25m;
    }

    # ------------------------------------------------------------------
    # Let's Encrypt ACME challenge (certbot standalone mode not required)
    # ------------------------------------------------------------------
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    access_log /var/log/nginx/freefsm.access.log;
    error_log  /var/log/nginx/freefsm.error.log warn;
}
